services:
  proof-publisher:
    image: fractalbitcoin/fractal-proof-publisher:latest
    restart: unless-stopped
    init: true
    user: "10001:10001"
    command: ["run"]
    environment:
      PUBLISHER_CONFIG: /app/config/config.json
    ports:
      - "${BIND_HOST:-127.0.0.1}:8080:8080"
    volumes:
      - ./config.json:/app/config/config.json:ro
      - ./data:/app/data
    networks:
      - fractal-indexer-fip101-net

networks:
  fractal-indexer-fip101-net:
    external: true
    name: fractal-indexer-fip101-net
